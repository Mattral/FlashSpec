name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check flashspec benchmarks tests scripts
      - name: Ruff format check
        run: ruff format --check flashspec benchmarks tests scripts
      - name: Mypy
        run: mypy --strict flashspec
      - name: Import-linter
        run: lint-imports

  unit-tests:
    name: Unit & integration tests (CPU)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run tests (CPU, skip GPU)
        run: pytest tests/unit tests/integration tests/chaos -m "not gpu and not slow" -x --cov=flashspec --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: cpu
          fail_ci_if_error: false

  toy-benchmark:
    name: Smoke-test benchmark (no weights)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[bench]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Toy benchmark
        run: python benchmarks/run_all.py --config benchmarks/configs/ --toy
