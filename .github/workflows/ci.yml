name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: lint ──────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: make lint
        run: make lint
      - name: pip-audit (fail on CRITICAL CVE — §15)
        run: |
          pip install pip-audit
          pip-audit --strict --vulnerability-service pypi -r <(pip freeze) 2>&1 | tee pip-audit.txt
          # Exit non-zero only on CRITICAL severity
          grep -q "CRITICAL" pip-audit.txt && exit 1 || true

  # ── Job 2: test-cpu ──────────────────────────────────────────────────────────
  test-cpu:
    name: test-cpu
    runs-on: ubuntu-22.04
    needs: lint
    env:
      TRITON_CPU_BACKEND: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: make test
        run: make test
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cpu
          path: coverage.xml
          retention-days: 7

  # ── Job 3: test-chaos ────────────────────────────────────────────────────────
  test-chaos:
    name: test-chaos
    runs-on: ubuntu-22.04
    needs: lint
    env:
      TRITON_CPU_BACKEND: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: make test-chaos
        run: make test-chaos

  # ── Job 4: coverage ──────────────────────────────────────────────────────────
  coverage:
    name: coverage
    runs-on: ubuntu-22.04
    needs: test-cpu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-cpu
      - name: Fail if coverage < 95%
        run: |
          pip install coverage --break-system-packages 2>/dev/null || pip install coverage
          python -m coverage report --fail-under=95 --rcfile=pyproject.toml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: cpu
          fail_ci_if_error: false

  # ── Job 5: onnx-parity ───────────────────────────────────────────────────────
  onnx-parity:
    name: onnx-parity
    runs-on: ubuntu-22.04
    needs: test-cpu
    env:
      TRITON_CPU_BACKEND: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install with ONNX extras
        run: |
          pip install -e ".[dev,onnx]" \
            --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run ONNX parity tests
        run: pytest tests/integration/test_onnx_parity.py -v

  # ── Job 6: docs-build ────────────────────────────────────────────────────────
  docs-build:
    name: docs-build
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install docs dependencies
        run: pip install -e ".[docs]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: make docs
        run: make docs
