name: Performance Benchmark

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"  # Every Monday at 04:00 UTC
  workflow_dispatch:

jobs:
  benchmark:
    name: Nightly performance benchmark
    runs-on: [self-hosted, gpu, H100]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[bench]"
      - name: Run benchmarks (Llama-3-8B)
        run: python benchmarks/run_all.py --config benchmarks/configs/llama3_8b.yaml
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/
          retention-days: 90
      - name: Check performance regression
        run: python scripts/check_regression.py --threshold 0.05
