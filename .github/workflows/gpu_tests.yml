name: GPU Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"  # Nightly at 02:00 UTC
  workflow_dispatch:

jobs:
  gpu-tests:
    name: GPU tests (H100)
    runs-on: [self-hosted, gpu, H100]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run GPU tests
        run: pytest tests/ -m gpu -x --cov=flashspec --cov-report=xml
      - name: Run slow distribution tests
        run: pytest tests/integration/test_e2e_sampling.py -m slow -x
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: gpu
          fail_ci_if_error: false
